title: "MostPomocy – Blog Pomocy Społecznej"
description: "Bezpłatny przewodnik po systemie wsparcia społecznego w Polsce."
baseurl: ""
url: "https://mostpomocy.pl"
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-seo-tag
pagination:
  enabled: true
  per_page: 9
  permalink: "/page/:num/"
  title: "Strona :num"
  sort_field: "date"
  sort_reverse: true
collections:
  posts:
    output: true
    permalink: /blog/:title/  # Krótkie URL bez daty, np. /blog/jak-znalezc-pomoc/