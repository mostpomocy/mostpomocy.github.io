<section class="section" aria-labelledby="search-heading">
  <div class="container">
    <nav aria-label="Ścieżka nawigacji" class="breadcrumb breadcrumb--inline">
      <a href="{{ '/' | relative_url }}">Start</a>
      <span aria-hidden="true"> › </span>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>

      <span aria-current="page">Wyszukiwarka</span>
    </nav>

    <h1 id="search-heading">Wyszukaj artykuły</h1>
    <p>Wpisz słowo kluczowe, aby znaleźć artykuły o pomocy społecznej, zdrowiu, rodzinie i więcej.</p>

    <!-- Search Form -->
    <form class="search-bar search-bar--page" id="search-form" role="search">
      <label for="search-input" class="visually-hidden">Szukaj artykułów</label>
      <input
        type="search"
        id="search-input"
        name="q"
        class="search-bar__input"
        placeholder="np. pomoc onkologiczna, dzieci, rodzina…"
        aria-label="Szukaj artykułów"
        autocomplete="off"
        autofocus
      >
      <button type="submit" class="search-bar__btn btn btn--primary" aria-label="Szukaj">
        <span aria-hidden="true">🔍</span> Szukaj
      </button>
    </form>

    <!-- Results -->
    <div id="search-status" class="search-status" aria-live="polite" aria-atomic="true"></div>
    <div id="search-results" class="post-grid" role="list" aria-label="Wyniki wyszukiwania"></div>

    <noscript>
      <div class="info-box info-box--warning mt-md">
        <p>Wyszukiwarka wymaga włączonego JavaScriptu. Włącz JS w przeglądarce i odśwież stronę.</p>
      </div>
    </noscript>
  </div>
